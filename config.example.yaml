mode: dry_run

bankroll: 1000
max_bet: 100
kelly_fraction: 0.15

# CRITICAL: Use airport weather station coordinates, NOT city center.
# Polymarket resolves on specific airport stations. Wrong coords = 3-8°F error.
cities:
  - name: NYC
    lat: 40.7772
    lon: -73.8726
    timezone: America/New_York
    station: KLGA  # LaGuardia
  - name: Chicago
    lat: 41.9742
    lon: -87.9073
    timezone: America/Chicago
    station: KORD  # O'Hare
  - name: Miami
    lat: 25.7959
    lon: -80.2870
    timezone: America/New_York
    station: KMIA
  - name: Dallas
    lat: 32.8471
    lon: -96.8518
    timezone: America/Chicago
    station: KDAL  # Love Field
  - name: Seattle
    lat: 47.4502
    lon: -122.3088
    timezone: America/Los_Angeles
    station: KSEA  # Sea-Tac
  - name: Atlanta
    lat: 33.6407
    lon: -84.4277
    timezone: America/New_York
    station: KATL  # Hartsfield

strategy:
  ladder:
    edge_threshold: 0.05
    allocation: 0.70
  tail:
    edge_threshold: 0.08
    min_odds: 10
    allocation: 0.20
  cash_reserve: 0.10

scheduler:
  offsets_utc:
    - "04:30"
    - "10:30"
    - "16:30"
    - "22:30"

monitoring:
  brier_threshold: 0.25
  webhook_url: null

# Sensitive: use environment variables
# WEATHER_BOT_POLYMARKET_PRIVATE_KEY=...
# WEATHER_BOT_POLYMARKET_API_KEY=...
# WEATHER_BOT_POLYMARKET_API_SECRET=...
